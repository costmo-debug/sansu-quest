<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>算数クエスト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic UI", "Meiryo", sans-serif;
    background: linear-gradient(160deg, #7ecbff 0%, #b3e5ff 35%, #fff3b0 100%);
    color: #333;
    touch-action: manipulation;
    min-height: 100%;
  }
  #app { max-width: 560px; margin: 0 auto; padding: 12px 12px 40px; }
  .screen { display: none; }
  .screen.active { display: block; animation: fadein .3s ease; }
  @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }

  h1 {
    text-align: center; font-size: 2.2rem; color: #ff6b35; margin: 14px 0 2px;
    text-shadow: 2px 2px 0 #fff, 4px 4px 0 rgba(255,150,50,.3);
    letter-spacing: .05em;
  }
  h1 rt { font-size: .85rem; color: #ff8c5a; }
  .subtitle { text-align: center; color: #2a7fbf; font-weight: bold; margin-bottom: 14px; }

  .panel {
    background: rgba(255,255,255,.92); border-radius: 20px; padding: 14px;
    margin-bottom: 14px; box-shadow: 0 4px 12px rgba(60,120,200,.15);
  }
  .panel h2 { font-size: 1.05rem; color: #2a7fbf; margin-bottom: 10px; }
  .panel h2::before { content: "★ "; color: #ffb703; }

  .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  button {
    font-family: inherit; font-size: 1.1rem; font-weight: bold; color: #fff;
    border: none; border-radius: 16px; min-height: 56px; padding: 8px 12px;
    cursor: pointer; box-shadow: 0 4px 0 rgba(0,0,0,.18);
    transition: transform .08s ease, filter .1s ease;
  }
  button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.18); }

  .play-btn { background: #845ef7; display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center; }
  .play-btn small { font-size: .72rem; font-weight: normal; opacity: .95; }
  .hero-btn { display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 72px; }
  .hero-btn[data-hero="knight"] { background: #4dabf7; }
  .hero-btn[data-hero="wizard"] { background: #da77f2; }
  .hero-btn svg { width: 44px; height: 44px; }
  .mode-btn { background: #4dabf7; }
  .mode-btn[data-mode="add"] { background: #4dabf7; }
  .mode-btn[data-mode="sub"] { background: #51cf66; }
  .mode-btn[data-mode="mul"] { background: #ff922b; }
  .mode-btn[data-mode="div"] { background: #cc5de8; }
  .mode-btn[data-mode="mix"] { background: #ff6b6b; grid-column: 1 / -1; }
  .level-btn { background: #74c0fc; display: flex; flex-direction: column; gap: 2px; align-items: center; justify-content: center; }
  .level-btn small { font-size: .72rem; font-weight: normal; opacity: .95; }
  .input-btn { background: #94d82d; }

  .mode-btn.selected, .level-btn.selected, .input-btn.selected, .play-btn.selected, .hero-btn.selected {
    outline: 4px solid #ffd43b; filter: brightness(1.08);
    position: relative;
  }
  .mode-btn.selected::after, .level-btn.selected::after, .input-btn.selected::after, .play-btn.selected::after, .hero-btn.selected::after {
    content: "✔"; position: absolute; top: -10px; right: -6px;
    background: #ffd43b; color: #7a5c00; border-radius: 50%;
    width: 26px; height: 26px; line-height: 26px; font-size: .9rem;
  }
  button.locked { background: #ced4da !important; color: #f1f3f5; box-shadow: none; cursor: default; }
  button.locked:active { transform: none; }

  #btn-start {
    width: 100%; min-height: 68px; font-size: 1.5rem;
    background: linear-gradient(135deg, #ff922b, #ff6b35);
    border-radius: 22px; margin-bottom: 14px;
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }

  #hiscore-table { width: 100%; border-collapse: collapse; font-size: .88rem; margin-bottom: 10px; }
  #hiscore-table th, #hiscore-table td { padding: 6px 3px; text-align: center; border-bottom: 2px dotted #cde4f7; }
  #hiscore-table th { color: #2a7fbf; }
  #hiscore-table td { font-weight: bold; color: #555; }
  #btn-erase { background: #adb5bd; width: 100%; font-size: .95rem; min-height: 48px; }

  #btn-mute {
    position: fixed; top: 10px; right: 10px; z-index: 50;
    width: 52px; height: 52px; min-height: 52px; border-radius: 50%;
    background: #fff; color: #333; font-size: 1.4rem;
    box-shadow: 0 3px 8px rgba(0,0,0,.25);
  }

  #map-board { position: relative; height: 250px; }
  #map-path { position: absolute; left: 0; top: 0; width: 100%; height: 100%; }
  .map-tag { position: absolute; font-size: .72rem; font-weight: bold; color: #495057; z-index: 1; }
  .stage-node { position: absolute; width: 76px; transform: translate(-50%, -50%); text-align: center; z-index: 2; }
  .stage-dot {
    width: 50px; height: 50px; line-height: 50px; margin: 0 auto; border-radius: 50%;
    background: #dee2e6; font-size: 1.3rem; box-shadow: 0 3px 0 rgba(0,0,0,.12);
  }
  .stage-dot svg { width: 38px; height: 38px; margin-top: 5px; }
  .stage-node.cleared .stage-dot { background: #ffe066; }
  .stage-node.current .stage-dot { background: #ffa94d; animation: pulse 1.4s infinite; }
  .stage-node small { display: block; font-size: .62rem; font-weight: bold; color: #495057; margin-top: 3px; line-height: 1.5; }
  .stage-node small rt { font-size: .5rem; color: #868e96; }
  #map-total { text-align: center; font-weight: bold; color: #2a7fbf; margin-top: 8px; font-size: 1.05rem; }
  #map-clear-banner { display: none; text-align: center; font-size: 1.2rem; font-weight: bold; color: #e8590c; margin-top: 8px; }
  #map-clear-banner.show { display: block; animation: pulse 1.2s infinite; }
  #btn-map-start { width: 100%; min-height: 64px; font-size: 1.2rem; background: linear-gradient(135deg, #ff922b, #ff6b35); border-radius: 20px; margin-bottom: 10px; }
  #btn-map-back { width: 100%; min-height: 52px; background: #4dabf7; }

  #game-header { display: flex; justify-content: space-between; align-items: center; margin: 8px 0 8px; gap: 6px; flex-wrap: wrap; }
  .hud { background: rgba(255,255,255,.9); border-radius: 14px; padding: 6px 12px; font-weight: bold; color: #2a7fbf; font-size: 1rem; }
  #hud-combo { color: #ff6b35; min-width: 96px; text-align: center; }
  #btn-quit { background: #adb5bd; min-height: 44px; font-size: .85rem; padding: 4px 10px; }

  #stage-label {
    display: none; text-align: center; font-weight: bold; color: #2a7fbf;
    background: rgba(255,255,255,.85); border-radius: 12px; padding: 4px; margin-bottom: 8px; font-size: 1rem;
  }
  #stage-label rt { font-size: .55rem; color: #74a5c9; }

  #timer-wrap { background: rgba(255,255,255,.8); border-radius: 12px; height: 22px; overflow: hidden; margin-bottom: 10px; }
  #timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #51cf66, #94d82d); border-radius: 12px; }
  #timer-bar.low { background: linear-gradient(90deg, #ff6b6b, #ff922b); }

  #battle-zone {
    position: relative; height: 170px; border-radius: 18px; margin-bottom: 10px; overflow: hidden;
    background: linear-gradient(180deg, #d0ebff 0%, #e7f5ff 55%, #b2f2bb 100%);
    box-shadow: inset 0 2px 10px rgba(60,120,200,.18);
  }
  #battle-zone.theme-1 { background: linear-gradient(180deg, #a5d8ff 0%, #d8f5a2 55%, #8ce99a 100%); }
  #battle-zone.theme-2 { background: linear-gradient(180deg, #c3fae8 0%, #8ce99a 50%, #40c057 100%); }
  #battle-zone.theme-3 { background: linear-gradient(180deg, #4263eb 0%, #748ffc 55%, #d0bfff 100%); }
  #battle-zone.theme-4 { background: linear-gradient(180deg, #ffd8a8 0%, #ffa94d 55%, #ff6b6b 100%); }
  #battle-zone.theme-5 { background: linear-gradient(180deg, #5f3dc4 0%, #9775fa 55%, #e599f7 100%); }
  #battle-zone.flash { animation: zoneflash .45s ease; }
  @keyframes zoneflash { 0% { box-shadow: inset 0 0 0 90px rgba(255,255,255,.95); } 100% { box-shadow: inset 0 2px 10px rgba(60,120,200,.18); } }
  #battle-zone.quake { animation: quake .55s ease; }
  @keyframes quake {
    0%,100% { transform: translate(0,0); }
    20% { transform: translate(-6px,3px); } 40% { transform: translate(6px,-3px); }
    60% { transform: translate(-4px,2px); } 80% { transform: translate(4px,-2px); }
  }
  #enemy-wrap { position: absolute; left: 50%; bottom: 30px; width: 96px; margin-left: -48px; text-align: center; will-change: transform; }
  #enemy-wrap.boss { width: 140px; margin-left: -70px; bottom: 16px; }
  #enemy-hp { width: 64px; height: 10px; margin: 0 auto 3px; background: rgba(255,255,255,.9); border-radius: 6px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,.25); }
  #enemy-wrap.boss #enemy-hp { width: 104px; height: 12px; }
  #enemy-hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #fa5252, #ff8787); border-radius: 6px; transition: width .25s ease; }
  #enemy-sprite { display: inline-block; }
  #enemy-sprite svg { width: 76px; height: 76px; display: block; margin: 0 auto; }
  #enemy-wrap.boss #enemy-sprite svg { width: 116px; height: 116px; }
  #enemy-sprite.intro { animation: eintro .6s ease; }
  @keyframes eintro { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  #enemy-sprite.hit { animation: ehit .32s ease; }
  @keyframes ehit {
    0% { filter: brightness(2.6) saturate(.3); }
    30% { transform: translateX(-7px); } 60% { transform: translateX(6px); }
    100% { filter: none; transform: translateX(0); }
  }
  #enemy-sprite.dodge { animation: edodge .55s ease; }
  @keyframes edodge {
    0% { transform: translateX(0); }
    28% { transform: translateX(-52px) rotate(-16deg); }
    62% { transform: translateX(44px) rotate(12deg); }
    100% { transform: translateX(0); }
  }
  #enemy-sprite.defeat { animation: edefeat .75s ease forwards; }
  @keyframes edefeat {
    35% { transform: scale(1.28); filter: brightness(2.4); }
    100% { transform: scale(.05) rotate(320deg); opacity: 0; }
  }
  #speech {
    position: absolute; top: 30px; transform: translateX(-50%); z-index: 9;
    background: #fff; border: 2px solid #495057; border-radius: 12px; padding: 3px 9px;
    font-size: .78rem; font-weight: bold; color: #343a40; white-space: nowrap;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  #speech.show { opacity: 1; }
  #hero { position: absolute; left: 8px; bottom: 2px; width: 56px; z-index: 4; }
  #hero svg { width: 56px; height: 56px; display: block; }
  #hero.attack { animation: heroatk .35s ease; }
  @keyframes heroatk { 30% { transform: translate(16px, -10px) rotate(-12deg); } 100% { transform: translate(0, 0); } }
  .shot { position: absolute; z-index: 6; left: 0; top: 0; font-size: 30px; line-height: 1; transition: transform .17s ease-in; pointer-events: none; }
  .shot.crit { font-size: 44px; }
  .spark { position: absolute; z-index: 7; width: 10px; height: 10px; border-radius: 50%; pointer-events: none; transition: transform .5s ease-out, opacity .5s ease-out; }
  .dmgpop {
    position: absolute; z-index: 8; font-weight: bold; font-size: 1.7rem; color: #e8590c;
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; pointer-events: none;
    transition: transform .7s ease-out, opacity .7s ease-out;
  }
  .dmgpop.crit { font-size: 2.4rem; color: #d6336c; }
  #battle-banner {
    position: absolute; top: 6px; left: 0; right: 0; text-align: center; z-index: 10;
    font-size: 1.2rem; font-weight: bold; color: #c92a2a;
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff;
    opacity: 0; transition: opacity .25s; pointer-events: none;
  }
  #battle-banner.show { opacity: 1; }
  #review-label {
    position: absolute; left: 0; right: 0; top: 0; bottom: 0; z-index: 3;
    display: none; align-items: center; justify-content: center; flex-direction: column;
    font-size: 1.5rem; font-weight: bold; color: #5f3dc4;
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff;
  }
  #review-label small { font-size: .85rem; color: #6741d9; }
  #battle-zone.review-mode #review-label { display: flex; }

  #question {
    background: #fff; border-radius: 24px; padding: 18px 10px; text-align: center;
    font-size: 2.4rem; font-weight: bold; color: #333; letter-spacing: .06em;
    box-shadow: 0 6px 16px rgba(60,120,200,.2); margin-bottom: 12px;
  }
  #question.pop { animation: qpop .3s ease; }
  @keyframes qpop { 0% { transform: scale(.85); } 70% { transform: scale(1.05); } 100% { transform: scale(1); } }

  #choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-btn { background: #4dabf7; font-size: 1.7rem; min-height: 72px; border-radius: 18px; }
  .choice-btn:nth-child(2) { background: #51cf66; }
  .choice-btn:nth-child(3) { background: #ff922b; }
  .choice-btn:nth-child(4) { background: #cc5de8; }

  #numpad { display: none; }
  #pad-display {
    background: #fff; border-radius: 14px; text-align: center; font-size: 2rem;
    font-weight: bold; min-height: 58px; line-height: 58px; margin-bottom: 10px; color: #2a7fbf;
  }
  #pad-keys { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .pad-btn { background: #74c0fc; font-size: 1.5rem; min-height: 60px; }
  .pad-btn.pad-clear { background: #adb5bd; font-size: 1.1rem; }
  .pad-btn.pad-ok { background: #ff6b35; font-size: 1.2rem; }

  #feedback {
    position: fixed; inset: 0; display: none; z-index: 40;
    align-items: center; justify-content: center; flex-direction: column;
    background: rgba(255,255,255,.6); text-align: center; padding: 20px;
  }
  #feedback.show { display: flex; }
  #fb-main { font-size: 3.2rem; font-weight: bold; animation: fbpop .35s ease; text-shadow: 0 2px 10px rgba(255,255,255,.95); }
  #fb-main.good { color: #f76707; }
  #fb-main.bad { color: #4c6ef5; }
  #fb-main.crit { color: #d6336c; }
  @keyframes fbpop { 0% { transform: scale(.3); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  #fb-sub { font-size: 1.3rem; font-weight: bold; color: #555; margin-top: 10px; text-shadow: 0 1px 6px rgba(255,255,255,.95); }
  #fb-answer { font-size: 2.6rem; font-weight: bold; color: #e03131; margin-top: 8px; text-shadow: 0 2px 10px rgba(255,255,255,.95); }

  #screen-result .panel, #screen-stageclear .panel { text-align: center; }
  #result-score { font-size: 3rem; font-weight: bold; color: #ff6b35; }
  #result-correct { font-size: 1.3rem; color: #2a7fbf; font-weight: bold; margin: 6px 0; }
  #result-title {
    font-size: 1.4rem; font-weight: bold; color: #862e9c;
    background: #f3d9fa; border-radius: 14px; padding: 10px; margin: 10px 0;
  }
  #result-record { display: none; font-size: 1.2rem; color: #e8590c; font-weight: bold; animation: pulse 1s infinite; }
  #result-record.show { display: block; }
  #btn-retry { width: 100%; min-height: 62px; font-size: 1.3rem; background: linear-gradient(135deg, #ff922b, #ff6b35); margin-bottom: 10px; }
  #btn-to-title { width: 100%; min-height: 56px; background: #4dabf7; }

  #sc-title { font-size: 1.8rem; color: #e8590c; font-weight: bold; }
  #sc-title rt { font-size: .6rem; }
  #sc-score { font-size: 2.2rem; color: #ff6b35; font-weight: bold; margin: 8px 0; }
  #sc-note { font-size: 1.05rem; color: #2a7fbf; font-weight: bold; margin-bottom: 4px; }
  #btn-sc-next { width: 100%; min-height: 62px; font-size: 1.25rem; background: linear-gradient(135deg, #51cf66, #37b24d); }

  .confetti {
    position: fixed; top: -20px; width: 12px; height: 12px; z-index: 60;
    animation: fall linear forwards; pointer-events: none;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: .2; }
  }

  @media (max-width: 400px) {
    #question { font-size: 2rem; padding: 15px 8px; }
    .choice-btn { font-size: 1.4rem; }
    #battle-zone { height: 160px; }
    #hiscore-table { font-size: .78rem; }
  }
</style>
</head>
<body>
<button id="btn-mute" aria-label="おとのオン・オフ">🔊</button>
<div id="app">

  <section id="screen-title" class="screen active">
    <h1><ruby>算数<rt>さんすう</rt></ruby>クエスト</h1>
    <p class="subtitle">けいさんで モンスターを やっつけよう！</p>

    <div class="panel">
      <h2>あそびかたを えらんでね</h2>
      <div class="btn-grid">
        <button class="play-btn" data-play="quest">🗺 クエスト<small>マップを すすんで ボスたいじ</small></button>
        <button class="play-btn" data-play="quick">⚡ クイック<small>10もん しょうぶ</small></button>
      </div>
    </div>

    <div class="panel">
      <h2>ゆうしゃを えらんでね</h2>
      <div class="btn-grid">
        <button class="hero-btn" data-hero="knight"><span class="hero-svg"></span>きし</button>
        <button class="hero-btn" data-hero="wizard"><span class="hero-svg"></span>まほうつかい</button>
      </div>
    </div>

    <div class="panel">
      <h2>モードを えらんでね</h2>
      <div id="mode-buttons" class="btn-grid">
        <button class="mode-btn" data-mode="add">＋ たしざん</button>
        <button class="mode-btn" data-mode="sub">− ひきざん</button>
        <button class="mode-btn" data-mode="mul">× かけざん</button>
        <button class="mode-btn" data-mode="div">÷ わりざん</button>
        <button class="mode-btn" data-mode="mix">★ ミックス（ぜんぶ）</button>
      </div>
    </div>

    <div class="panel">
      <h2>レベルを えらんでね</h2>
      <div id="level-buttons" class="btn-grid"></div>
    </div>

    <div class="panel">
      <h2>こたえかたを えらんでね</h2>
      <div class="btn-grid">
        <button class="input-btn" data-input="choice">4たくから えらぶ</button>
        <button class="input-btn" data-input="pad">すうじを うつ</button>
      </div>
    </div>

    <button id="btn-start">🚀 スタート！</button>

    <div class="panel">
      <h2>ハイスコア（クイック）</h2>
      <table id="hiscore-table"></table>
      <button id="btn-erase">きろくを ぜんぶ けす</button>
    </div>
  </section>

  <section id="screen-map" class="screen">
    <h1>ぼうけんマップ</h1>
    <p class="subtitle" id="map-info"></p>
    <div class="panel">
      <div id="map-board">
        <svg id="map-path" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
          <path d="M14 78 Q27 88 40 84 Q54 80 66 78 Q80 72 82 48 Q81 30 58 22"
                fill="none" stroke="#ced4da" stroke-width="3" stroke-dasharray="4 3"
                stroke-linecap="round" vector-effect="non-scaling-stroke"/>
        </svg>
        <span class="map-tag" style="left: 4%; top: 90%;">🚩スタート</span>
        <span class="map-tag" style="left: 72%; top: 6%;">🏰ゴール</span>
        <div id="map-nodes"></div>
      </div>
      <div id="map-total"></div>
      <div id="map-clear-banner">🏆 ぜんぶ クリア！ おめでとう！！</div>
    </div>
    <button id="btn-map-start">⚔️ ステージ1を はじめる</button>
    <button id="btn-map-back">タイトルに もどる</button>
  </section>

  <section id="screen-game" class="screen">
    <div id="game-header">
      <span class="hud" id="hud-progress">もんだい 1/10</span>
      <span class="hud" id="hud-score">スコア 0</span>
      <span class="hud" id="hud-combo"></span>
      <button id="btn-quit">やめる</button>
    </div>
    <div id="stage-label"></div>
    <div id="timer-wrap"><div id="timer-bar"></div></div>
    <div id="battle-zone">
      <div id="battle-banner"></div>
      <div id="review-label">📖 ふくしゅうタイム<small>まちがえた もんだいに チャレンジ！</small></div>
      <div id="speech"></div>
      <div id="enemy-wrap">
        <div id="enemy-hp"><div id="enemy-hp-fill"></div></div>
        <div id="enemy-sprite"></div>
      </div>
      <div id="hero"></div>
    </div>
    <div id="question">1 ＋ 1 ＝ ？</div>
    <div id="choices"></div>
    <div id="numpad">
      <div id="pad-display">&nbsp;</div>
      <div id="pad-keys">
        <button class="pad-btn" data-key="7">7</button>
        <button class="pad-btn" data-key="8">8</button>
        <button class="pad-btn" data-key="9">9</button>
        <button class="pad-btn" data-key="4">4</button>
        <button class="pad-btn" data-key="5">5</button>
        <button class="pad-btn" data-key="6">6</button>

function ri(rnd, min, max) {

function applyOp(op, a, b) {
  if (op === 'add') return a + b;
  if (op === 'sub') return a - b;
  if (op === 'mul') return a * b;
  return a / b;
}

function clamp01(x) {
  return Math.max(0, Math.min(1, x));
}

function growHi(lo, hi, g) {
  return lo + Math.round(clamp01(g) * (hi - lo));
}

function stageGrowth(stage) {
  return clamp01((stage - 1) / (STAGES_PER_MAP - 1));
}

function levelAllowsMode(level, mode) {
  if (level === 0) return mode === 'add' || mode === 'sub' || mode === 'mix';
  return true;
}

function genProblem(mode, level, rnd, growth) {
  var g = growth === undefined ? 1 : clamp01(growth);

  if (mode === 'mix') {
    var pool = level === 0 ? ['add', 'sub'] : ['add', 'sub', 'mul', 'div'];
    op = pool[Math.floor(rnd() * pool.length)];
  } else if (level === 0 && mode === 'mul') {
    op = 'add';
  } else if (level === 0 && mode === 'div') {
    op = 'sub';
  } else {
    op = mode;
  }
  var a, b, q, t, hi;
  if (op === 'add') {
    if (level === 0) { hi = growHi(5, 10, g); a = ri(rnd, 0, hi); b = ri(rnd, a === 0 ? 1 : 0, hi - a); }
    else if (level === 1) { hi = growHi(5, 9, g); a = ri(rnd, 1, hi); b = ri(rnd, 1, hi); }
    else if (level === 2) { hi = growHi(40, 99, g); a = ri(rnd, 10, hi); b = ri(rnd, 1, 9); }
    else { hi = growHi(40, 99, g); a = ri(rnd, 10, hi); b = ri(rnd, 10, hi); }
  } else if (op === 'sub') {
    if (level === 0) { hi = growHi(5, 10, g); a = ri(rnd, 1, hi); b = ri(rnd, 0, a); }
    else if (level === 1) { hi = growHi(5, 9, g); a = ri(rnd, 1, hi); b = ri(rnd, 1, hi); }
    else if (level === 2) { hi = growHi(40, 99, g); a = ri(rnd, 10, hi); b = ri(rnd, 1, 9); }
    else { hi = growHi(40, 99, g); a = ri(rnd, 10, hi); b = ri(rnd, 10, hi); }
    if (b > a) { t = a; a = b; b = t; }
  } else if (op === 'mul') {
    if (level === 1) { a = ri(rnd, 1, growHi(3, 5, g)); b = ri(rnd, 1, growHi(5, 9, g)); }
    else if (level === 2) { hi = growHi(5, 9, g); a = ri(rnd, 1, hi); b = ri(rnd, 1, hi); }
    else { a = ri(rnd, 10, growHi(40, 99, g)); b = ri(rnd, 2, 9); }
  } else {
    if (level === 1) { b = ri(rnd, 2, 5); q = ri(rnd, 1, growHi(5, 9, g)); }
    else if (level === 2) { b = ri(rnd, 2, 9); q = ri(rnd, 1, growHi(5, 9, g)); }
    else { b = ri(rnd, 2, 9); q = ri(rnd, 10, growHi(40, 99, g)); }
    a = b * q;
  }
  return { op: op, a: a, b: b, answer: applyOp(op, a, b) };
}

function nyuumonAddSeq(stage) {
  var a = Math.floor((stage - 1) / 2) + 1;
  var list = [];
  var i;
  if (stage % 2 === 1) {
    for (i = 1; i <= 5; i++) list.push({ op: 'add', a: a, b: i, answer: a + i });
  } else {
    for (i = 10 - a; i >= 6 - a; i--) list.push({ op: 'add', a: a, b: i, answer: a + i });
  }
  return list;
}

function nyuumonSubSeq(stage) {
  var flat = [];
  for (var mnd = 2; mnd <= 10; mnd++) {
    for (var k = 1; k < mnd; k++) flat.push({ op: 'sub', a: mnd, b: k, answer: mnd - k });
  }
  var start = (stage - 1) * 5;
  var chunk = flat.slice(start, start + 5);
  if (stage % 2 === 0) chunk.reverse();
  return chunk;
}

function nyuumonStageSeq(mode, stage) {
  if (mode === 'sub') return nyuumonSubSeq(stage);
  if (mode === 'mix') return stage % 2 === 1 ? nyuumonAddSeq((stage + 1) / 2) : nyuumonSubSeq(stage / 2);
  return nyuumonAddSeq(stage);
}

function nyuumonSeqProblem(mode, stage, index) {
  var list = nyuumonStageSeq(mode, stage);
  var i = ((index % list.length) + list.length) % list.length;
  return list[i];
}

function problemKey(p) {
  return p.op + '-' + p.a + '-' + p.b;
}

function addToReview(queue, problem) {
  for (var i = 0; i < queue.length; i++) {
    if (problemKey(queue[i]) === problemKey(problem)) return queue;
  }
  return queue.concat([{ op: problem.op, a: problem.a, b: problem.b, answer: problem.answer }]);
}

function makeChoices(answer, rnd) {
  var deltas = [1, -1, 2, -2, 3, -3, 10, -10, 20, -20, 5, -5, 11, -11, 9, -9];
  var set = [answer];
  var guard = 0;
  while (set.length < 4) {
    guard++;
    var cand;
    if (guard > 200) {
      cand = answer + guard;
    } else if (guard > 40) {
      cand = answer + ri(rnd, 1, 30) * (rnd() < 0.5 ? -1 : 1);
    } else {
      cand = answer + deltas[Math.floor(rnd() * deltas.length)];
    }
    if (Number.isInteger(cand) && cand >= 0 && set.indexOf(cand) === -1) set.push(cand);
  }
  for (var j = set.length - 1; j > 0; j--) {
    var k = Math.floor(rnd() * (j + 1));
    var tmp = set[j]; set[j] = set[k]; set[k] = tmp;
  }
  return set;
}

function applyHit(battle, damage) {
  var hp = Math.max(0, battle.hp - damage);
  var defeated = hp === 0;
  var wasBoss = battle.plan[battle.enemyIndex].kind === 'boss';
  var nextIndex = defeated ? battle.enemyIndex + 1 : battle.enemyIndex;
  var stageClear = nextIndex >= battle.plan.length;
  return {
    battle: {
      stage: battle.stage,
      plan: battle.plan,
      enemyIndex: stageClear ? battle.enemyIndex : nextIndex,
      hp: defeated ? (stageClear ? 0 : battle.plan[nextIndex].maxHp) : hp,

    },
    defeated: defeated,
    stageClear: stageClear,
    wasBoss: wasBoss
  };
}

function questKey(mode, level) {

function defaultQuestEntry() {

}

function recordStageClear(entry, stage, stageScore, misses) {
  var e = { cleared: entry.cleared, score: entry.score, best: entry.best, miss: entry.miss };
  if (stage !== e.cleared + 1 || stage < 1 || stage > STAGES_PER_MAP) return e;
  e.cleared = stage;
  e.score += Math.max(0, Math.floor(stageScore) || 0);
  e.miss += Math.max(0, Math.floor(misses) || 0);
  if (e.cleared === STAGES_PER_MAP && e.score > e.best) e.best = e.score;
  return e;
}

function normalizeSaveData(d) {
  var out = { hs: {}, muted: false, input: 'choice', play: 'quest', hero: 'knight', quest: {} };
  if (!d || typeof d !== 'object' || Array.isArray(d)) return out;
  if (d.hs && typeof d.hs === 'object' && !Array.isArray(d.hs)) {
    Object.keys(d.hs).forEach(function (k) {
      if (typeof d.hs[k] === 'number' && isFinite(d.hs[k]) && d.hs[k] > 0) out.hs[k] = Math.floor(d.hs[k]);
    });
  }
  out.muted = d.muted === true;
  out.input = d.input === 'pad' ? 'pad' : 'choice';
  out.play = d.play === 'quick' ? 'quick' : 'quest';
  out.hero = d.hero === 'wizard' ? 'wizard' : 'knight';
  if (d.quest && typeof d.quest === 'object' && !Array.isArray(d.quest)) {
    Object.keys(d.quest).forEach(function (k) {
      var e = d.quest[k];
      if (!e || typeof e !== 'object') return;
      var num = function (v, cap) {
        if (typeof v !== 'number' || !isFinite(v)) return 0;
        var n = Math.floor(v);
        if (n < 0) return 0;
        return cap === undefined ? n : Math.min(cap, n);
      };
      var entry = { cleared: num(e.cleared, STAGES_PER_MAP), score: num(e.score), best: num(e.best), miss: num(e.miss) };
      if (entry.cleared > 0 || entry.score > 0 || entry.best > 0) out.quest[k] = entry;
    });
  }
  return out;
}

  var ZAKO_SVGS = { slime: svgSlime, mushroom: svgMushroom, bat: svgBat, ghost: svgGhost };
  var BOSS_SVGS = { kingslime: svgKingSlime, treant: svgTreant, golem: svgGolem, dragon: svgDragon, maou: svgMaou };
  var ZAKO_NAMES = { slime: 'スライム', mushroom: 'キノコ', bat: 'コウモリ', ghost: 'おばけ' };
  var QUICK_COLOR_POOL = [
    ['#69db7c', '#2f9e44'], ['#74c0fc', '#1971c2'], ['#ffa94d', '#e8590c'],
    ['#e599f7', '#9c36b5'], ['#ff8787', '#e03131'], ['#9775fa', '#5f3dc4']
  ];
  var FX_COLORS = {
    sword: ['#e9ecef', '#ffd43b', '#ffffff'],
    magic: ['#b197fc', '#845ef7', '#ffffff'],
    star: ['#ffd43b', '#ff8787', '#ffffff']
  };

  function heroSvg() {
    return data.hero === 'wizard' ? svgWizard() : svgKnight();
  }
  function renderHero() {
    $('hero').innerHTML = heroSvg();
    document.querySelectorAll('.hero-btn .hero-svg').forEach(function (el) {
      el.innerHTML = el.parentNode.dataset.hero === 'wizard' ? svgWizard() : svgKnight();
    });
  }

  var fx = { moving: false, raf: 0, osc: 0, lastTs: 0 };
  var bannerTimer = 0;
  var speechTimer = 0;

  function addOnce(el, cls) {
    el.classList.remove(cls);
    void el.offsetWidth;
    el.classList.add(cls);
  }

  function showBanner(html, ms) {
    var b = $('battle-banner');
    b.innerHTML = html;
    b.classList.add('show');
    clearTimeout(bannerTimer);
    bannerTimer = setTimeout(function () { b.classList.remove('show'); }, ms);
  }

  function showSpeech(text, ms) {
    var s = $('speech');
    var zone = $('battle-zone');
    var zr = zone.getBoundingClientRect();
    var er = $('enemy-wrap').getBoundingClientRect();
    var x = er.left - zr.left + er.width / 2;
    x = Math.max(56, Math.min(zr.width - 56, x));
    s.textContent = text;
    s.style.left = x + 'px';
    s.classList.add('show');
    clearTimeout(speechTimer);
    speechTimer = setTimeout(function () { s.classList.remove('show'); }, ms);
  }

  function enemyLoop(ts) {
    if (!fx.moving) { fx.raf = 0; fx.lastTs = 0; return; }
    if (!fx.lastTs) fx.lastTs = ts;
    var dt = Math.min(0.1, (ts - fx.lastTs) / 1000);
    fx.lastTs = ts;
    fx.osc += dt * (Math.PI * 2 / enemyPeriodSec(state.inputActive));
    var zone = $('battle-zone');
    var half = zone.clientWidth / 2;
    var margin = state.isBoss ? 76 : 56;
    var amp = Math.max(16, half - margin);
    var x = amp * Math.sin(fx.osc);
    var bob = 4 * Math.sin(fx.osc * 1.7);
    $('enemy-wrap').style.transform = 'translate(' + x.toFixed(1) + 'px,' + bob.toFixed(1) + 'px)';
    fx.raf = requestAnimationFrame(enemyLoop);
  }
  function setEnemyMoving(on) {
    fx.moving = on;
    if (on && !fx.raf) fx.raf = requestAnimationFrame(enemyLoop);
  }

  function updateHpBar() {
    var pct = state.dispMax > 0 ? Math.max(0, Math.min(100, (state.dispHp / state.dispMax) * 100)) : 0;
    $('enemy-hp-fill').style.width = pct + '%';
  }

  function resetBattleZone(themeStage) {
    var zone = $('battle-zone');
    zone.classList.remove('review-mode');
    for (var i = 1; i <= STAGES_PER_MAP; i++) zone.classList.remove('theme-' + i);
    if (themeStage) zone.classList.add('theme-' + themeStage);
    $('enemy-wrap').style.display = '';
    $('speech').classList.remove('show');
    $('battle-banner').classList.remove('show');
  }

  function spawnEnemy(opt) {
    state.isBoss = !!opt.boss;
    state.dispMax = opt.hp;
    state.dispHp = opt.hp;
    var wrap = $('enemy-wrap');
    wrap.classList.toggle('boss', state.isBoss);
    var sp = $('enemy-sprite');
    sp.className = '';
    sp.innerHTML = opt.svg;
    updateHpBar();
    sp.classList.add('intro');
    fx.osc = Math.random() * 6.283;
    if (state.isBoss) {
      addOnce($('battle-zone'), 'quake');
      showBanner('ボスの ' + opt.name + 'が あらわれた！！', 1500);
      soundBossAppear();
      setTimeout(function () { showSpeech(enemyLine('bossAppear', Math.random), 1400); }, 500);
    } else {
      showSpeech(opt.name + '「' + enemyLine('appear', Math.random) + '」', 1100);
    }
    setEnemyMoving(true);
  }

  function spawnQuestEnemy() {
    var theme = STAGE_THEMES[state.stage - 1];
    var idx = state.battle.enemyIndex;
    var en = state.battle.plan[idx];
    if (en.kind === 'boss') {
      spawnEnemy({ boss: true, hp: en.maxHp, name: theme.bossName, svg: BOSS_SVGS[theme.boss]() });
    } else {
      var cc = idx === 0 ? theme.zakoColors : theme.zakoColors2;
      spawnEnemy({ boss: false, hp: en.maxHp, name: theme.zakoName, svg: ZAKO_SVGS[theme.zako](cc[0], cc[1]) });
    }
  }

  function spawnQuickEnemy() {
    var kinds = Object.keys(ZAKO_SVGS);
    var kind = kinds[Math.floor(Math.random() * kinds.length)];
    var cc = QUICK_COLOR_POOL[Math.floor(Math.random() * QUICK_COLOR_POOL.length)];
    spawnEnemy({ boss: false, hp: ZAKO_HP, name: ZAKO_NAMES[kind], svg: ZAKO_SVGS[kind](cc[0], cc[1]) });
  }

  function zoneRect() { return $('battle-zone').getBoundingClientRect(); }
  function enemyCenter() {
    var zr = zoneRect();
    var er = $('enemy-wrap').getBoundingClientRect();
    return { x: er.left - zr.left + er.width / 2, y: er.top - zr.top + er.height / 2 };
  }

  function fireShot(crit, style, cb) {
    var zone = $('battle-zone');
    var zr = zoneRect();
    var c = enemyCenter();
    var s = document.createElement('div');
    s.className = 'shot' + (crit ? ' crit' : '');
    s.textContent = style === 'sword' ? '🗡️' : style === 'magic' ? '🔮' : (Math.random() < 0.5 ? '⭐' : '💖');
    var off = crit ? 22 : 15;
    s.style.transform = 'translate(44px,' + (zr.height - 44) + 'px)';
    zone.appendChild(s);
    void s.offsetWidth;
    s.style.transform = 'translate(' + (c.x - off) + 'px,' + (c.y - off) + 'px) scale(' + (crit ? 1.3 : 1) + ')';
    addOnce($('hero'), 'attack');
    setTimeout(function () { s.remove(); cb(c.x, c.y); }, 180);
  }

  function burst(x, y, count, colors) {
    var zone = $('battle-zone');
    for (var i = 0; i < count; i++) {
      var p = document.createElement('div');
      p.className = 'spark';
      p.style.background = colors[i % colors.length];
      p.style.left = (x - 5) + 'px';
      p.style.top = (y - 5) + 'px';
      zone.appendChild(p);
      void p.offsetWidth;
      var ang = Math.random() * Math.PI * 2;
      var dist = 30 + Math.random() * 55;
      p.style.transform = 'translate(' + Math.cos(ang) * dist + 'px,' + Math.sin(ang) * dist + 'px) scale(.3)';
      p.style.opacity = '0';
      setTimeout(function (el) { return function () { el.remove(); }; }(p), 600);
    }
  }

  function dmgPop(x, y, text, crit) {
    var zone = $('battle-zone');
    var p = document.createElement('div');
    p.className = 'dmgpop' + (crit ? ' crit' : '');
    p.textContent = text;
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.transform = 'translate(-50%,0)';
    zone.appendChild(p);
    void p.offsetWidth;
    p.style.transform = 'translate(-50%,-46px)';
    p.style.opacity = '0';
    setTimeout(function () { p.remove(); }, 750);
  }

  function dodgeFx() {
    addOnce($('enemy-sprite'), 'dodge');
    showSpeech(enemyLine('dodge', Math.random), 1100);
  }

  function defeatFx(x, y, boss) {
    addOnce($('enemy-sprite'), 'defeat');
    burst(x, y, boss ? 26 : 12, boss ? ['#ffd43b', '#ff6b6b', '#ffffff', '#ff922b'] : ['#ffd43b', '#adb5bd', '#ffffff']);
    if (boss) {
      addOnce($('battle-zone'), 'quake');
      showBanner('ボスを たおした！！', 1600);
      showSpeech(enemyLine('bossDefeat', Math.random), 1400);
      soundBossDefeat();
      buzz([90, 60, 160]);
    } else {
      showSpeech(enemyLine('defeat', Math.random), 1100);
      soundDefeat();
      buzz(70);
    }
  }

  function renderLevelButtons() {
    var wrap = $('level-buttons');
    wrap.innerHTML = '';
    LEVELS.forEach(function (lv) {
      var btn = document.createElement('button');
      btn.className = 'level-btn';
      btn.dataset.level = String(lv.level);
      btn.innerHTML = lv.label + '<small>' + lv.grade + '</small>';
      btn.addEventListener('click', function () {
        if (lv.level === 0 && !levelAllowsMode(0, state.mode)) return;
        state.level = lv.level;
        refreshSelections();
      });
      wrap.appendChild(btn);
    });
  }

  function refreshSelections() {
    document.querySelectorAll('.play-btn').forEach(function (b) {
      b.classList.toggle('selected', b.dataset.play === state.play);
    });
    document.querySelectorAll('.hero-btn').forEach(function (b) {
      b.classList.toggle('selected', b.dataset.hero === data.hero);
    });
    document.querySelectorAll('.mode-btn').forEach(function (b) {
      var locked = !levelAllowsMode(state.level, b.dataset.mode);
      b.classList.toggle('locked', locked);
      b.classList.toggle('selected', !locked && b.dataset.mode === state.mode);
    });
    document.querySelectorAll('.level-btn').forEach(function (b) {
      var lvl = Number(b.dataset.level);
      var locked = lvl === 0 && !levelAllowsMode(0, state.mode);
      b.classList.toggle('locked', locked);
      b.classList.toggle('selected', lvl === state.level);
    });
    document.querySelectorAll('.input-btn').forEach(function (b) {
      b.classList.toggle('selected', b.dataset.input === state.input);
    });
    $('btn-start').textContent = state.play === 'quest' ? '🚀 ぼうけんに でかける！' : '🚀 スタート！';
  }

  document.querySelectorAll('.play-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      state.play = b.dataset.play;
      data.play = state.play;
      saveData();
      refreshSelections();
    });
  });
  document.querySelectorAll('.hero-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      data.hero = b.dataset.hero === 'wizard' ? 'wizard' : 'knight';
      saveData();
      renderHero();
      refreshSelections();
    });
  });
  document.querySelectorAll('.mode-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      if (!levelAllowsMode(state.level, b.dataset.mode)) return;
      state.mode = b.dataset.mode;
      refreshSelections();
    });
  });
  document.querySelectorAll('.input-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      state.input = b.dataset.input;
      data.input = state.input;
      saveData();
      refreshSelections();
    });
  });

  function hsKey(mode, level) { return mode + '-' + level; }

  function renderHiscores() {
    var t = $('hiscore-table');
    var html = '<tr><th></th>';
    LEVELS.forEach(function (lv) {
      html += '<th>' + (lv.level === 0 ? 'にゅうもん' : 'Lv' + lv.level) + '</th>';
    });
    html += '</tr>';
    MODES.forEach(function (m) {
      html += '<tr><th>' + m.sym + ' ' + m.label + '</th>';
      LEVELS.forEach(function (lv) {
        var v = data.hs[hsKey(m.id, lv.level)];
        html += '<td>' + (v ? v + 'てん' : '−') + '</td>';
      });
      html += '</tr>';
    });
    t.innerHTML = html;
  }

  $('btn-erase').addEventListener('click', function () {
    if (confirm('きろく（ハイスコアと ぼうけんの きろく）を ぜんぶ けしますか？')) {
      data.hs = {};
      data.quest = {};
      saveData();
      renderHiscores();
    }
  });

  function setupInputArea() {
    $('choices').style.display = state.input === 'choice' ? 'grid' : 'none';
    $('numpad').style.display = state.input === 'pad' ? 'block' : 'none';
  }

  function startQuick() {
    state.play = 'quick';
    state.playing = true;
    state.gameId++;
    state.qNum = 0;
    state.score = 0;
    state.correct = 0;
    state.combo = 0;
    state.stage = 0;
    state.growth = 1;
    state.battle = null;
    state.stageMiss = 0;
    state.seqIndex = 0;
    state.phase = 'battle';
    state.reviewQueue = [];
    state.reviewIndex = 0;
    state.limitMs = timeLimitSec(state.level) * 1000;
    setupInputArea();
    resetBattleZone(0);
    renderHero();
    $('stage-label').style.display = 'none';
    showScreen('game');
    nextQuestion();
  }

  function startStage(stage) {
    var theme = STAGE_THEMES[stage - 1];
    state.play = 'quest';
    state.playing = true;
    state.gameId++;
    state.stage = stage;
    state.growth = stageGrowth(stage);
    state.battle = createBattle(stage);
    state.qNum = 0;
    state.score = 0;
    state.correct = 0;
    state.combo = 0;
    state.stageMiss = 0;
    state.seqIndex = 0;
    state.phase = 'battle';
    state.reviewQueue = [];
    state.reviewIndex = 0;
    state.limitMs = timeLimitSec(state.level) * 1000;
    setupInputArea();
    resetBattleZone(stage);
    renderHero();
    var label = $('stage-label');
    label.style.display = 'block';
    label.innerHTML = 'ステージ' + stage + '　<ruby>' + theme.name + '<rt>' + theme.kana + '</rt></ruby>';
    showScreen('game');
    spawnQuestEnemy();
    nextQuestion();
  }

  function enterMap() {
    renderMap();
    showScreen('map');
  }

  var MAP_POS = [
    { x: 14, y: 78 }, { x: 40, y: 84 }, { x: 66, y: 78 }, { x: 82, y: 48 }, { x: 58, y: 22 }
  ];

  function renderMap() {
    var key = questKey(state.mode, state.level);
    var entry = data.quest[key] || defaultQuestEntry();
    var mode = MODES.filter(function (x) { return x.id === state.mode; })[0];
    var lv = LEVELS.filter(function (x) { return x.level === state.level; })[0];
    $('map-info').textContent = mode.sym + ' ' + mode.label + '・' + lv.label;
    var wrap = $('map-nodes');
    wrap.innerHTML = '';
    var clear = isMapClear(entry);
    for (var s = 1; s <= STAGES_PER_MAP; s++) {
      var theme = STAGE_THEMES[s - 1];
      var node = document.createElement('div');
      var cls = 'stage-node';
      var dot;
      if (s <= entry.cleared) { cls += ' cleared'; dot = '⭐'; }
      else if (!clear && s === entry.cleared + 1) { cls += ' current'; dot = heroSvg(); }
      else { dot = '🔒'; }
      node.className = cls;
      node.style.left = MAP_POS[s - 1].x + '%';
      node.style.top = MAP_POS[s - 1].y + '%';
      node.innerHTML = '<div class="stage-dot">' + dot + '</div>' +
        '<small><ruby>' + theme.name + '<rt>' + theme.kana + '</rt></ruby></small>';
      wrap.appendChild(node);
    }
    $('map-total').textContent = 'そうスコア ' + entry.score + 'てん' + (entry.best > 0 ? '（さいこう ' + entry.best + 'てん）' : '');
    $('map-clear-banner').classList.toggle('show', clear);
    $('btn-map-start').textContent = clear
      ? '🔁 さいしょから もういちど'
      : '⚔️ ステージ' + (entry.cleared + 1) + '「' + STAGE_THEMES[entry.cleared].name + '」に すすむ';
  }

  $('btn-map-start').addEventListener('click', function () {
    var key = questKey(state.mode, state.level);
    var entry = data.quest[key] || defaultQuestEntry();
    if (isMapClear(entry)) {
      data.quest[key] = resetQuestEntry(entry);
      saveData();
      startStage(1);
    } else {
      startStage(entry.cleared + 1);
    }
  });
  $('btn-map-back').addEventListener('click', function () {
    renderHiscores();
    showScreen('title');
  });

  $('btn-start').addEventListener('click', function () {
    if (state.play === 'quest') enterMap();
    else startQuick();
  });
  $('btn-retry').addEventListener('click', function () {
    if (state.play === 'quest') {
      var key = questKey(state.mode, state.level);
      data.quest[key] = resetQuestEntry(data.quest[key] || defaultQuestEntry());
      saveData();
      enterMap();
    } else {
      startQuick();
    }
  });
  $('btn-to-title').addEventListener('click', function () { renderHiscores(); showScreen('title'); });
  $('btn-sc-next').addEventListener('click', function () { enterMap(); });
  $('btn-quit').addEventListener('click', function () {
    stopTimer();
    setEnemyMoving(false);
    state.answered = true;
    state.playing = false;
    state.gameId++;
    $('feedback').classList.remove('show');
    if (state.play === 'quest') enterMap();
    else { renderHiscores(); showScreen('title'); }
  });

  function stopTimer() {
    if (state.rafId) { cancelAnimationFrame(state.rafId); state.rafId = 0; }
  }

  function tickTimer() {
    var remain = state.deadline - performance.now();
    var ratio = Math.max(0, remain / state.limitMs);
    var bar = $('timer-bar');
    bar.style.width = (ratio * 100) + '%';
    bar.classList.toggle('low', ratio < 0.3);
    if (remain <= 0) {
      if (!state.answered) handleAnswer(null);
      return;
    }
    state.rafId = requestAnimationFrame(tickTimer);
  }

  function renderProblem() {
    state.answered = false;
    state.padValue = '';
    state.inputActive = false;

    var q = $('question');
    q.textContent = state.problem.a + ' ' + OP_SYM[state.problem.op] + ' ' + state.problem.b + ' ＝ ？';
    q.classList.remove('pop');
    void q.offsetWidth;
    q.classList.add('pop');

    if (state.input === 'choice') {
      var wrap = $('choices');
      wrap.innerHTML = '';
      makeChoices(state.problem.answer, Math.random).forEach(function (c) {
        var btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = String(c);
        btn.addEventListener('click', function () { handleAnswer(c); });
        wrap.appendChild(btn);
      });
    } else {
      $('pad-display').innerHTML = '&nbsp;';
    }

    state.deadline = performance.now() + state.limitMs;
    tickTimer();
  }

  function nextQuestion() {
    if (!state.playing) return;
    stopTimer();

    if (state.phase === 'review') {
      if (state.reviewIndex >= state.reviewQueue.length) { endReview(); return; }
      state.problem = state.reviewQueue[state.reviewIndex];
      $('hud-progress').textContent = 'ふくしゅう ' + (state.reviewIndex + 1) + '/' + state.reviewQueue.length;
      $('hud-score').textContent = 'スコア ' + state.score;
      $('hud-combo').textContent = '';
      renderProblem();
      return;
    }

    state.qNum++;
    if (state.play === 'quick' && state.qNum > QUESTIONS_PER_GAME) { maybeStartReview(); return; }

    if (state.play === 'quest' && state.level === 0) {
      state.problem = nyuumonSeqProblem(state.mode, state.stage, state.seqIndex);
      state.seqIndex++;
    } else {
      state.problem = genProblem(state.mode, state.level, Math.random, state.play === 'quest' ? state.growth : 1);
    }

    if (state.play === 'quick') {
      spawnQuickEnemy();
      $('hud-progress').textContent = 'もんだい ' + state.qNum + '/' + QUESTIONS_PER_GAME;
    } else {
      var left = state.battle.plan.length - state.battle.defeated;
      $('hud-progress').textContent = 'ステージ' + state.stage + '　てき あと' + left;
      var sp = $('enemy-sprite');
      sp.classList.remove('hit');
      sp.classList.remove('dodge');
      setEnemyMoving(true);
    }
    $('hud-score').textContent = 'スコア ' + state.score;
    $('hud-combo').textContent = state.combo >= 2 ? '🔥' + state.combo + 'れんぞく ' + cheerMessage(state.combo) : '';

    renderProblem();
  }

  function markInputActive() {
    if (!state.answered) state.inputActive = true;
  }
  $('choices').addEventListener('pointerover', markInputActive);
  $('choices').addEventListener('pointerdown', markInputActive);
  $('choices').addEventListener('touchstart', markInputActive, { passive: true });

  document.querySelectorAll('.pad-btn').forEach(function (b) {
    b.addEventListener('click', function () {
      if (state.answered) return;
      var key = b.dataset.key;
      if (key === 'clear') {
        state.padValue = '';
      } else if (key === 'ok') {
        if (state.padValue === '') return;
        handleAnswer(Number(state.padValue));
        return;
      } else if (state.padValue.length < 4) {
        state.padValue += key;
      }
      state.inputActive = state.padValue.length > 0;
      $('pad-display').textContent = state.padValue || ' ';
    });
  });

  function maybeStartReview() {
    if (state.reviewQueue.length > 0) { startReview(); return; }
    if (state.play === 'quest') finishStage();
    else showResult();
  }

  function startReview() {
    state.phase = 'review';
    state.reviewIndex = 0;
    setEnemyMoving(false);
    $('enemy-wrap').style.display = 'none';
    $('battle-zone').classList.add('review-mode');
    showBanner('📖 ふくしゅうタイム！', 1600);
    beep(523, 0.15, 0);
    beep(659, 0.2, 0.15);
    nextQuestion();
  }

  function endReview() {
    state.phase = 'battle';
    $('enemy-wrap').style.display = '';
    $('battle-zone').classList.remove('review-mode');
    if (state.play === 'quest') finishStage();
    else showResult();
  }

  function handleReviewAnswer(value) {
    state.answered = true;
    stopTimer();
    var isCorrect = value === state.problem.answer;
    var gid = state.gameId;
    var fb = $('feedback');
    var main = $('fb-main');
    var sub = $('fb-sub');
    var ans = $('fb-answer');
    if (isCorrect) {
      state.score += REVIEW_BONUS;
      $('hud-score').textContent = 'スコア ' + state.score;
      main.textContent = '⭕ せいかい！';
      main.className = 'good';
      sub.textContent = 'ふくしゅう ばっちり！（＋' + REVIEW_BONUS + 'てん）';
      ans.textContent = '';
      soundCorrect();
    } else {
      main.textContent = value === null ? '⏰ じかんぎれ！' : 'ざんねん！';
      main.className = 'bad';
      sub.textContent = 'だいじょうぶ！ こたえを おぼえよう。';
      ans.textContent = state.problem.a + ' ' + OP_SYM[state.problem.op] + ' ' + state.problem.b + ' ＝ ' + state.problem.answer;
      soundWrong();
    }
    state.reviewIndex++;
    setTimeout(function () {
      if (gid !== state.gameId || !state.playing) return;
      fb.classList.add('show');
    }, 120);
    setTimeout(function () {
      if (gid !== state.gameId) return;
      fb.classList.remove('show');
      if (state.playing) nextQuestion();
    }, isCorrect ? 1100 : 2300);
  }

  function handleAnswer(value) {
    if (state.answered) return;
    if (state.phase === 'review') { handleReviewAnswer(value); return; }
    state.answered = true;
    stopTimer();
    setEnemyMoving(false);

    var remain = Math.max(0, state.deadline - performance.now());
    var ratio = remain / state.limitMs;
    var isCorrect = value === state.problem.answer;
    var gid = state.gameId;

    var fb = $('feedback');
    var main = $('fb-main');
    var sub = $('fb-sub');
    var ans = $('fb-answer');

    if (isCorrect) {
      var crit = isCritical(ratio);
      var dmg = hitDamage(crit);
      var style = attackStyle(state.mode, state.level);
      state.combo++;
      state.correct++;
      state.score += calcScore(ratio, state.combo - 1);
      var defeated, wasBoss = false, stageClear = false;
      if (state.play === 'quest') {
        var res = applyHit(state.battle, dmg);
        state.battle = res.battle;
        defeated = res.defeated;
        wasBoss = res.wasBoss;
        stageClear = res.stageClear;
      } else {
        defeated = true;
      }
      $('hud-score').textContent = 'スコア ' + state.score;

      fireShot(crit, style, function (x, y) {
        if (gid !== state.gameId) return;
        state.dispHp = Math.max(0, state.dispHp - dmg);
        updateHpBar();
        addOnce($('enemy-sprite'), 'hit');
        burst(x, y, crit ? 14 : 8, FX_COLORS[style]);
        dmgPop(x, y - 12, String(dmg), crit);
        if (crit) {
          addOnce($('battle-zone'), 'flash');
          showBanner('クリティカル！！', 900);
          soundCritical();
        } else {
          soundHit();
        }
        if (defeated) {
          setTimeout(function () {
            if (gid !== state.gameId) return;
            defeatFx(x, y, wasBoss);
          }, 230);
        }
      });

      main.textContent = crit ? '💥 クリティカル！！' : ['⭕ せいかい！', '🌟 すごい！', '🎯 やったね！'][Math.floor(Math.random() * 3)];
      main.className = crit ? 'good crit' : 'good';
      if (!crit) soundCorrect();
      sub.textContent = state.combo >= 2 ? state.combo + 'れんぞく！ ' + cheerMessage(state.combo) : '';
      ans.textContent = '';

      var delay = stageClear ? 2300 : defeated ? (wasBoss ? 2300 : 1550) : 1100;
      setTimeout(function () {
        if (gid !== state.gameId || !state.playing) return;
        fb.classList.add('show');
      }, 340);
      setTimeout(function () {
        if (gid !== state.gameId) return;
        fb.classList.remove('show');
        if (!state.playing) return;
        if (state.play === 'quest') {
          if (stageClear) { maybeStartReview(); return; }
          if (defeated) spawnQuestEnemy();
          nextQuestion();
        } else {
          nextQuestion();
        }
      }, delay);
    } else {
      state.combo = 0;
      state.stageMiss++;
      state.reviewQueue = addToReview(state.reviewQueue, state.problem);
      dodgeFx();
      soundWrong();
      main.textContent = value === null ? '⏰ じかんぎれ！' : 'ざんねん！';
      main.className = 'bad';
      sub.textContent = 'だいじょうぶ！ つぎは できるよ。こたえは…';
      ans.textContent = state.problem.a + ' ' + OP_SYM[state.problem.op] + ' ' + state.problem.b + ' ＝ ' + state.problem.answer;
      setTimeout(function () {
        if (gid !== state.gameId || !state.playing) return;
        fb.classList.add('show');
      }, 430);
      setTimeout(function () {
        if (gid !== state.gameId) return;
        fb.classList.remove('show');
        if (state.playing) nextQuestion();
      }, 2450);
    }
  }

  function dropConfetti(count) {
    var n = count || 40;
    var colors = ['#ff6b6b', '#ffd43b', '#51cf66', '#4dabf7', '#cc5de8', '#ff922b'];
    for (var i = 0; i < n; i++) {
      var c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = (Math.random() * 100) + 'vw';
      c.style.background = colors[i % colors.length];
      c.style.animationDuration = (1.8 + Math.random() * 1.6) + 's';
      c.style.animationDelay = (Math.random() * 0.6) + 's';
      c.style.borderRadius = Math.random() < 0.5 ? '50%' : '2px';
      document.body.appendChild(c);
      setTimeout(function (el) { return function () { el.remove(); }; }(c), 4500);
    }
  }

  function finishStage() {
    stopTimer();
    state.playing = false;
    setEnemyMoving(false);
    var theme = STAGE_THEMES[state.stage - 1];
    var key = questKey(state.mode, state.level);
    var entry = data.quest[key] || defaultQuestEntry();
    var updated = recordStageClear(entry, state.stage, state.score, state.stageMiss);
    data.quest[key] = updated;
    saveData();
    if (isMapClear(updated)) { showQuestResult(updated); return; }
    $('sc-title').innerHTML = 'ステージ' + state.stage + '「<ruby>' + theme.name + '<rt>' + theme.kana + '</rt></ruby>」クリア！';
    $('sc-score').textContent = '＋' + state.score + 'てん';
    $('sc-note').textContent = 'つぎの ステージが ひらいたよ！';
    showScreen('stageclear');
    soundFanfare();
    dropConfetti(18);
  }

  function showQuestResult(entry) {
    $('result-score').textContent = entry.score + 'てん';
    $('result-correct').textContent = '5ステージ ぜんぶ クリア！';
    $('result-title').innerHTML = '<ruby>称号<rt>しょうごう</rt></ruby>：' + scoreTitle(entry.score);
    $('result-record').classList.toggle('show', entry.score > 0 && entry.score >= entry.best);
    $('btn-retry').textContent = 'もういちど ぼうけんする';
    showScreen('result');
    soundFanfare();
    dropConfetti(40);
  }

  function showResult() {
    stopTimer();
    state.playing = false;
    setEnemyMoving(false);
    $('result-score').textContent = state.score + 'てん';
    $('result-correct').textContent = QUESTIONS_PER_GAME + 'もんちゅう ' + state.correct + 'もん せいかい';
    $('result-title').innerHTML = '<ruby>称号<rt>しょうごう</rt></ruby>：' + getTitle(state.correct);
    $('btn-retry').textContent = 'もういちど あそぶ';

    var key = hsKey(state.mode, state.level);
    var prev = data.hs[key] || 0;
    var isRecord = state.score > prev;
    if (isRecord) {
      data.hs[key] = state.score;
      saveData();
    }
    $('result-record').classList.toggle('show', isRecord && state.score > 0);

    showScreen('result');
    if (state.correct >= 6) { soundFanfare(); dropConfetti(40); }
  }

  renderLevelButtons();
  renderHero();
  refreshSelections();
  renderHiscores();
  updateMuteButton();
})();
</script>
</body>
</html>
